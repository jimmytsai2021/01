name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 指定在哪個分支 push 後會自動部署
  workflow_dispatch: # 允許手動觸發

# 設定 workflow 的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 取消正在進行中的相同部署任務
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # 建議對齊專案的 Node 版本

      - name: Install dependencies
        run: npm install
        working-directory: ./pixel-trivia

      # 建立靜態檔，並直接傳入所需的環境變數（透過 GitHub Secrets 及 Variables）
      # `--base=/${{ github.event.repository.name }}/` 會自動設定正確的 baseUrl，不需去改 vite.config.js
      - name: Build project
        run: npx vite build --base=/${{ github.event.repository.name }}/
        working-directory: ./pixel-trivia
        env:
          # 從 Repository secrets 取得
          VITE_GOOGLE_APP_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_APP_SCRIPT_URL }}
          # 以下變數如有設定到 Repository variables 則取 variables、否則吃預設值
          VITE_PASS_THRESHOLD: ${{ vars.VITE_PASS_THRESHOLD || 3 }}
          VITE_QUESTION_COUNT: ${{ vars.VITE_QUESTION_COUNT || 5 }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pixel-trivia/dist # vite 預設編譯出的資料夾是 dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
